services:
  user-service:
    build:
      context: ./services/user_service
    restart: unless-stopped
    ports:
      - "8001:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--backlog", "4096"]
    environment:
      HTTP_MAX_CONNECTIONS: "500"
      HTTP_MAX_KEEPALIVE: "100"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: application-logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - kafka
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/users/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - log-network
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  order-service:
    build:
      context: ./services/order_service
    restart: unless-stopped
    ports:
      - "8002:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--backlog", "4096"]
    environment:
      HTTP_MAX_CONNECTIONS: "500"
      HTTP_MAX_KEEPALIVE: "100"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: application-logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - kafka
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/orders/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - log-network
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  payment-service:
    build:
      context: ./services/payment_service
    restart: unless-stopped
    ports:
      - "8003:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--backlog", "4096"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: application-logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - kafka
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/payments/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - log-network
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  analytics-api:
    build:
      context: ./services/analytics_api
    restart: unless-stopped
    ports:
      - "8004:8000"

    environment:
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - elasticsearch
      - redis

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3

    networks:
      - log-network

  nginx:
    build:
      context: ./infrastructure/nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - order-service
      - payment-service
      - analytics-api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/users/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - log-network
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - log-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - log-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    mem_limit: 2g
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - log-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - log-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on:
      - elasticsearch
    networks:
      - log-network

  spark-streaming:
    build:
      context: ./streaming/spark
    container_name: spark-streaming
    restart: unless-stopped
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - log-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - elasticsearch

    volumes:
      - grafana-data:/var/lib/grafana

    networks:
      - log-network

  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - analytics-api
      - nginx
    networks:
      - log-network

volumes:
  elasticsearch-data:
  grafana-data:
  redis-data:

networks:
  log-network:
    driver: bridge